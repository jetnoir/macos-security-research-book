<svg viewBox="0 0 600 520" xmlns="http://www.w3.org/2000/svg" font-family="'Georgia', 'Times New Roman', serif">
  <defs>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000022"/>
    </filter>
    <!-- Subtle gradient for centre -->
    <radialGradient id="centreGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </radialGradient>
    <!-- Phase card gradients -->
    <linearGradient id="phaseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fa"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="300" y="38" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a2a3a" letter-spacing="2">THE SIX-PHASE RESEARCH FRAMEWORK</text>
  <line x1="80" y1="48" x2="520" y2="48" stroke="#1a2a3a" stroke-width="1" opacity="0.3"/>

  <!-- Outer ring (decorative) -->
  <circle cx="300" cy="275" r="195" fill="none" stroke="#1a2a3a" stroke-width="1" stroke-dasharray="4,6" opacity="0.15"/>
  <circle cx="300" cy="275" r="170" fill="none" stroke="#1a2a3a" stroke-width="0.5" opacity="0.08"/>

  <!-- Connecting flow arrows between phases (drawn before phases so they appear behind) -->
  <!-- Scope → Recon (top to top-right) -->
  <path d="M 367 122 Q 415 110 432 143" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>
  <!-- Recon → Tracks (top-right to right) -->
  <path d="M 467 183 Q 480 215 468 248" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>
  <!-- Tracks → Red-Team (right to bottom-right) -->
  <path d="M 463 313 Q 472 345 452 372" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>
  <!-- Red-Team → Submit (bottom-right to bottom-left) -->
  <path d="M 370 418 Q 300 438 230 418" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>
  <!-- Submit → Archive (bottom-left to left) -->
  <path d="M 147 372 Q 128 345 138 313" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6" marker-end="url(#arrow)"/>
  <!-- Archive → Scope (left to top — cycle arrow) -->
  <path d="M 143 248 Q 135 180 233 122" fill="none" stroke="#2980b9" stroke-width="1.5" stroke-dasharray="3,4" opacity="0.5" marker-end="url(#arrowBlue)"/>

  <!-- Arrowhead markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c0392b" opacity="0.7"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#2980b9" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Centre circle -->
  <circle cx="300" cy="275" r="62" fill="url(#centreGrad)" filter="url(#shadow)"/>
  <circle cx="300" cy="275" r="62" fill="none" stroke="#c0392b" stroke-width="1.5" opacity="0.6"/>
  <text x="300" y="265" text-anchor="middle" font-size="11" fill="#ecf0f1" letter-spacing="1" font-weight="bold">RESEARCH</text>
  <text x="300" y="282" text-anchor="middle" font-size="11" fill="#ecf0f1" letter-spacing="1" font-weight="bold">CYCLE</text>
  <line x1="265" y1="272" x2="335" y2="272" stroke="#c0392b" stroke-width="0.8" opacity="0.5"/>
  <text x="300" y="298" text-anchor="middle" font-size="9" fill="#95a5a6" letter-spacing="0.5">iterative</text>

  <!-- PHASE 1: SCOPE (top) -->
  <g transform="translate(233, 70)">
    <rect x="0" y="0" width="134" height="68" rx="6" fill="url(#phaseGrad)" stroke="#1a2a3a" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="134" height="5" rx="3" fill="#1a2a3a"/>
    <rect x="0" y="3" width="134" height="2" fill="#1a2a3a"/>
    <text x="20" y="24" font-size="9" fill="#7f8c8d" letter-spacing="1">PHASE 1</text>
    <text x="20" y="42" font-size="17" font-weight="bold" fill="#1a2a3a">Scope</text>
    <text x="20" y="58" font-size="9" fill="#555" font-style="italic">Define &amp; Constrain</text>
  </g>

  <!-- PHASE 2: RECON (top-right) -->
  <g transform="translate(420, 120)">
    <rect x="0" y="0" width="134" height="68" rx="6" fill="url(#phaseGrad)" stroke="#1a2a3a" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="134" height="5" rx="3" fill="#1a2a3a"/>
    <rect x="0" y="3" width="134" height="2" fill="#1a2a3a"/>
    <text x="20" y="24" font-size="9" fill="#7f8c8d" letter-spacing="1">PHASE 2</text>
    <text x="20" y="42" font-size="17" font-weight="bold" fill="#1a2a3a">Recon</text>
    <text x="20" y="58" font-size="9" fill="#555" font-style="italic">Map Attack Surface</text>
  </g>

  <!-- PHASE 3: TRACKS (right) -->
  <g transform="translate(443, 240)">
    <rect x="0" y="0" width="134" height="68" rx="6" fill="url(#phaseGrad)" stroke="#1a2a3a" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="134" height="5" rx="3" fill="#1a2a3a"/>
    <rect x="0" y="3" width="134" height="2" fill="#1a2a3a"/>
    <text x="20" y="24" font-size="9" fill="#7f8c8d" letter-spacing="1">PHASE 3</text>
    <text x="20" y="42" font-size="17" font-weight="bold" fill="#1a2a3a">Tracks</text>
    <text x="20" y="58" font-size="9" fill="#555" font-style="italic">Investigate &amp; Test</text>
  </g>

  <!-- PHASE 4: RED-TEAM (bottom-right) -->
  <g transform="translate(380, 370)">
    <rect x="0" y="0" width="134" height="68" rx="6" fill="url(#phaseGrad)" stroke="#c0392b" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="134" height="5" rx="3" fill="#c0392b"/>
    <rect x="0" y="3" width="134" height="2" fill="#c0392b"/>
    <text x="20" y="24" font-size="9" fill="#7f8c8d" letter-spacing="1">PHASE 4</text>
    <text x="20" y="42" font-size="17" font-weight="bold" fill="#1a2a3a">Red-Team</text>
    <text x="20" y="58" font-size="9" fill="#555" font-style="italic">Challenge Findings</text>
  </g>

  <!-- PHASE 5: SUBMIT (bottom-left) -->
  <g transform="translate(88, 370)">
    <rect x="0" y="0" width="134" height="68" rx="6" fill="url(#phaseGrad)" stroke="#27ae60" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="134" height="5" rx="3" fill="#27ae60"/>
    <rect x="0" y="3" width="134" height="2" fill="#27ae60"/>
    <text x="20" y="24" font-size="9" fill="#7f8c8d" letter-spacing="1">PHASE 5</text>
    <text x="20" y="42" font-size="17" font-weight="bold" fill="#1a2a3a">Submit</text>
    <text x="20" y="58" font-size="9" fill="#555" font-style="italic">Disclose Responsibly</text>
  </g>

  <!-- PHASE 6: ARCHIVE (left) -->
  <g transform="translate(23, 240)">
    <rect x="0" y="0" width="134" height="68" rx="6" fill="url(#phaseGrad)" stroke="#1a2a3a" stroke-width="1.5" filter="url(#shadow)"/>
    <rect x="0" y="0" width="134" height="5" rx="3" fill="#1a2a3a"/>
    <rect x="0" y="3" width="134" height="2" fill="#1a2a3a"/>
    <text x="20" y="24" font-size="9" fill="#7f8c8d" letter-spacing="1">PHASE 6</text>
    <text x="20" y="42" font-size="17" font-weight="bold" fill="#1a2a3a">Archive</text>
    <text x="20" y="58" font-size="9" fill="#555" font-style="italic">Document &amp; Learn</text>
  </g>

  <!-- Footer note -->
  <text x="300" y="500" text-anchor="middle" font-size="9" fill="#95a5a6" font-style="italic">Phases are iterative — findings in any phase may require returning to earlier stages</text>
</svg>
